<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VDom</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
      }
      #app {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      .container {
        padding: 20px;
      }
      h1 {
        color: #333;
        margin-top: 0;
      }
      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
      }
      button:hover {
        background: #0056b3;
      }
      p {
        color: #666;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- ReScript compiles src/test.res -> src/test.res.js -->
    <script type="module" src="/src/test.res.js"></script>
  </body>
</html>
